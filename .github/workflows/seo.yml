name: SEO Metadata Check

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/seo.yml'
      - 'book.toml'
      - 'scripts/checkSeoMetadata.mjs'
      - 'scripts/updateSeoMetadata.mjs'
      - 'theme/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/seo.yml'
      - 'book.toml'
      - 'scripts/checkSeoMetadata.mjs'
      - 'scripts/updateSeoMetadata.mjs'
      - 'theme/**'
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  seo_metadata:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.4.48'

      - name: Install mdbook-admonish
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-admonish
          version: '1.18.0'

      - name: Build HTML
        run: lake run build
        env:
          GITHUB_ACTIONS: "true"

      - name: Check SEO metadata
        run: node scripts/checkSeoMetadata.mjs
